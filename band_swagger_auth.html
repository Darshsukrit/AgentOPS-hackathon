    <style>
    /*
 * Theme stylesheet — Stripe-style auth page, band.ai colors.
 *
 * Layered on top of FusionAuth Classic. Classic's grid + input-group
 * CSS still runs underneath; this file restyles the surface (panel,
 * inputs, buttons, page bg).
 */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap");

:root {
    --primary: #92ed92; /* band.ai green */
    --primary-hover: #b5f2b5; /* lighter green on hover */
    --ink: #1a1a1a;
    --ink-muted: #6b7280;
    --bg: #f5f5f5;
    --panel-bg: #ffffff;
    --border-soft: #e5e7eb;
    --border-medium: #d1d5db;
    --focus-ring: rgba(146, 237, 146, 0.45);
    --footer-bg: #f9fafb;
    --latte: #fff8e7;
}

/* Page background — flat brand-neutral gray */
html,
body {
    font-family:
        "Inter",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif !important;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Card / panel: clean white, big radius, soft shadow */
.panel {
    background: var(--panel-bg) !important;
    border: 1px solid var(--border-soft) !important;
    border-radius: 16px;
    box-shadow:
        0 10px 25px -10px rgba(0, 0, 0, 0.1),
        0 4px 12px -4px rgba(0, 0, 0, 0.06);
    padding: 2.5rem !important;
    overflow: hidden; /* lets us bleed a footer strip to the edges */
    position: relative;
}

/* Headings */
h1,
h2,
h3 {
    color: var(--ink);
    font-family:
        "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}
h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 1.5rem;
}
h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 1.5rem;
    text-transform: none;
    letter-spacing: 0;
}
h3 {
    font-size: 1rem;
    font-weight: 700;
}

p,
label {
    color: var(--ink);
}
p {
    line-height: 1.5;
    color: var(--ink-muted);
}
a {
    color: var(--ink);
    text-underline-offset: 3px;
}
a:hover {
    opacity: 0.75;
}

/* Hide empty logo placeholder */
.logo-container img:not([src]),
.logo-container img[src=""] {
    display: none;
}

/* Labels above inputs */
label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--ink);
}

/* Inputs — rounded, no icon addon, clean Stripe-style */
.input-addon-group {
    position: relative;
    display: block;
}
.input-addon-group .icon {
    display: none;
} /* hide any leftover left-addon icons */

.panel input[type="text"],
.panel input[type="email"],
.panel input[type="password"],
.panel input[type="number"],
.panel input[type="tel"],
.panel input[type="search"],
.panel select,
.panel textarea {
    width: 100% !important;
    box-sizing: border-box !important;
    height: 44px !important;
    padding: 0 0.9rem !important;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--ink);
    background: #fff !important;
    border: 1px solid var(--border-medium) !important;
    border-radius: 8px !important;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    transition:
        border-color 100ms ease,
        box-shadow 100ms ease;
}

.panel input:focus,
.panel select:focus,
.panel textarea:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: none;
}

/* Primary submit button — full-width, band.ai green, matches input height (44px) */
.panel .button.blue,
.panel button.blue {
    width: 100%;
    box-sizing: border-box;
    height: 44px;
    padding: 0 1.25rem !important;
    background: var(--primary) !important;
    border: 1.5px solid #000 !important;
    color: #000 !important;
    border-radius: 8px !important;
    font-weight: 700 !important;
    font-size: 0.9rem !important;
    line-height: 1 !important;
    box-shadow: none !important;
    transition: background 100ms ease;
    margin-top: 0.25rem;
}

.panel .button.blue:hover,
.panel button.blue:hover {
    background: var(--primary-hover) !important;
}

.panel .button.blue i.fa,
.panel button.blue i.fa {
    display: none;
}

/* Secondary buttons (password-complete login buttons, social logins) */
.panel a.button,
.panel .login-button {
    width: 100%;
    box-sizing: border-box;
    height: 44px;
    display: flex !important;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    background: transparent !important;
    border: 1px solid var(--border-medium) !important;
    border-radius: 8px !important;
    color: var(--ink) !important;
    font-weight: 600 !important;
    font-size: 0.75rem !important;
    text-decoration: none;
    padding: 0 1rem !important;
    line-height: 1 !important;
    margin-bottom: 0.5rem;
    transition:
        background 100ms ease,
        border-color 100ms ease;
}

/* Wrapper inside .login-button — Classic wraps icon+text in a div */
.panel .login-button > div {
    display: flex !important;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
}

/* Provider icon — size + center it. Classic gives .google .icon a white
   background + horizontal padding (made sense on Classic's blue Google
   button); strip both so the icon sits flush on our white button. */
.panel .login-button .icon {
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: transparent !important;
    padding: 0 !important;
    border-radius: 0 !important;
}
.panel .login-button .icon svg,
.panel .login-button .icon i {
    width: 20px !important;
    height: 20px !important;
    font-size: 18px !important;
}

/* Force the button label visible (FA Classic hides .text on some buttons) */
.panel .login-button .text {
    display: inline-block !important;
    color: var(--ink) !important;
    font-size: 0.9rem !important; /* match the primary "Sign in" button */
    font-weight: 600 !important;
    text-transform: none !important;
    line-height: 1.4 !important;
}

/* "Or sign in with" divider above social logins — line on BOTH sides of the label */
.panel .hr-container {
    display: flex !important;
    align-items: center;
    margin: 1.25rem 0 1rem;
    color: var(--ink-muted) !important;
    font-size: 0.75rem !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
}
.panel .hr-container::before,
.panel .hr-container::after {
    content: "";
    flex: 1;
    border-top: 1px solid var(--border-soft);
}
.panel .hr-container hr {
    display: none !important;
}
.panel .hr-container > div {
    padding: 0 0.75rem;
    white-space: nowrap;
    text-transform: none !important;
    color: var(--ink-muted) !important;
}
.panel a.button:hover,
.panel .login-button:hover {
    background: #f2f3f4 !important;
    box-shadow: none !important;
    opacity: 1;
}

/* Form rows */
.panel .form-row {
    margin-bottom: 1rem;
}

/* Checkbox — no container border/background, only the .box square is styled.
   FusionAuth Classic's fusionauth-style.css has high-specificity rules on
   .checkbox-list / .checkbox, so we both raise specificity and force the
   override with !important. */
.panel .form-row .checkbox-list,
.panel .form-row label.checkbox {
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    margin: 0 0 0.25rem !important;
}

.panel .form-row label.checkbox {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    cursor: pointer;
}

/* Match the checkbox border to the input borders */
.checkbox span.box {
    border-color: var(--border-medium) !important;
}

.checkbox input[type="checkbox"]:checked + .box {
    background: transparent !important;
    border-color: var(--border-medium) !important;
}

/* Black checkmark instead of white, and no drop-shadow */
.checkbox span.box::after,
.checkbox span.box:after {
    border-color: #000 !important;
    box-shadow: none !important;
}

/* Classic also paints a blue focus ring on .box when the input is focused.
   Kill that too (we have no focus indicator on the checkbox itself). */
.checkbox input:focus + span.box,
.checkbox input:focus-visible + span.box {
    box-shadow: none !important;
}

.panel .form-row label.checkbox .label,
.panel .form-row label.checkbox span.label {
    line-height: 1.6 !important;
    font-size: 0.9rem !important;
    display: inline-block;
}

.checkbox .label a {
    color: var(--ink);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 2px;
}

/* "Forgot password?" link styling — when placed inline next to a label */
.label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.4rem;
}
.label-row label {
    margin-bottom: 0;
}
.label-row a {
    font-size: 0.875rem;
}

/* Brand logo centered above the page title.
   FusionAuth Classic's fusionauth-style.css sets .logo-container { display:none }
   by default — force it visible. */
.panel .logo-container {
    display: block !important;
    text-align: center;
    margin: 0 0 1.25rem !important;
}
.panel .logo-container img {
    display: inline-block !important;
    height: 28px;
    width: auto;
}

/* Info-circle icon next to checkbox labels (e.g. "Keep me signed in").
   Classic paints `label i.fa` cyan blue (#1e91cf); match our ink-muted gray. */
.panel label i.fa,
.panel label i.fa.fa-info-circle,
.panel .checkbox .label i.fa-info-circle,
.panel i.fa-info-circle {
    color: var(--ink-muted) !important;
}

/* Hide FusionAuth footer if it ever slips back in */
#fa-footer {
    display: none !important;
}

    <script>
      "use strict";
      Prime.Document.onReady(function() {
        Prime.Document.query('.alert').each(function(e) {
          var dismissButton = e.queryFirst('a.dismiss-button');
          if (dismissButton !== null) {
            new Prime.Widgets.Dismissable(e, dismissButton).initialize();
          }
        });
        Prime.Document.query('[data-tooltip]').each(function(e) {
          new Prime.Widgets.Tooltip(e).withClassName('tooltip').initialize();
        });
        document.querySelectorAll('.date-picker').forEach(datePicker => {
          datePicker.onfocus = () => datePicker.type = 'date';
          datePicker.onblur = () => {
            if (datePicker.value === '') {
              datePicker.type = 'text';
            }
          };
        });
        var localeSelect = Prime.Document.queryById('locale-select');
        if (localeSelect !== null) {
          new FusionAuth.OAuth2.LocaleSelect(localeSelect);
        }
      });
      FusionAuth.Version = "1.62.1";
    </script>
